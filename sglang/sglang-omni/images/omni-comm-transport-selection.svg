<svg xmlns="http://www.w3.org/2000/svg" width="1248" height="846" viewBox="0 0 1248 846" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
<rect x="0.5" y="0.5" width="1247" height="845" rx="14" fill="#ffffff" stroke="#e6e5df"/>
<text x="34" y="48" font-size="21" font-weight="700" fill="#14304a" letter-spacing="-0.2">Which path do the bytes take?</text>
<text x="34" y="72" font-size="13" fill="#898781"><tspan>CommRouter picks for every message; stage code never does.</tspan></text>
<g transform="translate(34,98)">
    <defs>
      <marker id="a-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#8b8a84" stroke-width="1.8" stroke-linecap="round"/></marker>
      <marker id="a-local" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#16a394" stroke-width="1.8" stroke-linecap="round"/></marker>
      <marker id="a-direct" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#2a78d6" stroke-width="1.8" stroke-linecap="round"/></marker>
      <marker id="a-idle" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#b3b2ab" stroke-width="1.8" stroke-linecap="round"/></marker>
    </defs>

    <!-- ============ Q1 ============ -->
    <rect x="0" y="0" width="400" height="72" rx="10" fill="#f4f4f1"/>
    <text x="22" y="30" font-size="14" font-weight="600" fill="#14304a">Do producer and consumer share a process?</text>
    <text x="22" y="52" font-size="12" fill="#52514e">two stages running in the same process</text>

    <path d="M 404 36 L 460 36" stroke="#16a394" stroke-width="2" marker-end="url(#a-local)"/>
    <text x="418" y="28" font-size="11.5" fill="#0c7368" font-weight="600">yes</text>

    <rect x="466" y="8" width="690" height="56" rx="10" fill="#e9f6f4"/>
    <rect x="482" y="22" width="160" height="28" rx="14" fill="#16a394"/>
    <text x="562" y="41" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">LOCAL_OBJECT</text>
    <text x="660" y="41" font-size="12.5" fill="#52514e">hand the Python object over — nothing is copied, both planes are skipped</text>

    <path d="M 60 76 L 60 104" stroke="#8b8a84" stroke-width="2" marker-end="url(#a-g)"/>
    <text x="72" y="96" font-size="11.5" fill="#898781" font-weight="600">no</text>

    <!-- ============ Q2 ============ -->
    <rect x="0" y="108" width="400" height="72" rx="10" fill="#f4f4f1"/>
    <text x="22" y="138" font-size="14" font-weight="600" fill="#14304a">Same single GPU, and the payload qualifies?</text>
    <text x="22" y="160" font-size="12" fill="#52514e">qualifies: CUDA tensors, small inline header</text>

    <path d="M 404 144 L 460 144" stroke="#2a78d6" stroke-width="2" marker-end="url(#a-direct)"/>
    <text x="418" y="136" font-size="11.5" fill="#1c5cab" font-weight="600">yes</text>

    <rect x="466" y="116" width="690" height="56" rx="10" fill="#eef4fc"/>
    <rect x="482" y="130" width="200" height="28" rx="14" fill="#2a78d6"/>
    <text x="582" y="149" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">direct Torch CUDA IPC</text>
    <text x="700" y="149" font-size="12.5" fill="#52514e">rides as an IPC handle inside the control message — no pool, no ack</text>

    <path d="M 60 184 L 60 212" stroke="#8b8a84" stroke-width="2" marker-end="url(#a-g)"/>
    <text x="72" y="204" font-size="11.5" fill="#898781" font-weight="600">no</text>

    <!-- ============ Q3 ============ -->
    <rect x="0" y="216" width="400" height="72" rx="10" fill="#f4f4f1"/>
    <text x="22" y="246" font-size="14" font-weight="600" fill="#14304a">Is this edge explicitly remote?</text>
    <text x="22" y="268" font-size="12" fill="#52514e">cross-node launch topology — outside Phase 0</text>

    <path d="M 404 252 L 460 252" stroke="#b3b2ab" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a-idle)"/>
    <text x="418" y="244" font-size="11.5" fill="#898781" font-weight="600">yes</text>

    <rect x="466" y="224" width="690" height="56" rx="10" fill="#f7f7f5" stroke="#d9d8d2" stroke-dasharray="5 4"/>
    <rect x="482" y="238" width="160" height="28" rx="14" fill="#b3b2ab"/>
    <text x="562" y="257" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">remote relay</text>
    <text x="660" y="257" font-size="12.5" fill="#898781">the router selects Mooncake only for explicitly remote edges</text>

    <path d="M 60 292 L 60 320" stroke="#8b8a84" stroke-width="2" marker-end="url(#a-g)"/>
    <text x="72" y="312" font-size="11.5" fill="#898781" font-weight="600">no</text>

    <!-- ============ Q4 ============ -->
    <rect x="0" y="324" width="400" height="72" rx="10" fill="#f4f4f1"/>
    <text x="22" y="354" font-size="14" font-weight="600" fill="#14304a">Where does the data actually live?</text>
    <text x="22" y="376" font-size="12" fill="#52514e">a GPU stage can still emit CPU tensors</text>

    <path d="M 404 360 L 460 360" stroke="#8b8a84" stroke-width="2" marker-end="url(#a-g)"/>

    <!-- four outcomes -->
    <rect x="466" y="332" width="690" height="62" rx="10" fill="#f2effa"/>
    <rect x="482" y="348" width="150" height="28" rx="14" fill="#6b5ca8"/>
    <text x="557" y="367" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">CUDA IPC relay</text>
    <text x="650" y="360" font-size="12.5" fill="#52514e">CUDA tensors to a GPU stage: packed through the sender's GPU pool;</text>
    <text x="650" y="378" font-size="12.5" fill="#52514e">any CPU tensors mixed in ride along and come back out on CPU</text>

    <rect x="466" y="404" width="690" height="62" rx="10" fill="#fdf3e7"/>
    <rect x="482" y="420" width="150" height="28" rx="14" fill="#d97a2b"/>
    <text x="557" y="439" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">SHM relay</text>
    <text x="650" y="432" font-size="12.5" fill="#52514e">CPU tensors, or no tensors: one shared-memory block per transfer,</text>
    <text x="650" y="450" font-size="12.5" fill="#52514e">only a few blocks in flight at a time</text>

    <rect x="466" y="476" width="690" height="62" rx="10" fill="#fdf3e7"/>
    <rect x="482" y="492" width="150" height="28" rx="14" fill="#d97a2b"/>
    <text x="557" y="511" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">SHM + copy</text>
    <text x="650" y="504" font-size="12.5" fill="#52514e">GPU tensors headed to a CPU stage: copied to host during packing;</text>
    <text x="650" y="522" font-size="12.5" fill="#52514e">a compatibility path, not a fast one</text>

    <rect x="466" y="548" width="690" height="62" rx="10" fill="#fbecec"/>
    <rect x="482" y="564" width="150" height="28" rx="14" fill="#d03b3b"/>
    <text x="557" y="583" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">rejected</text>
    <text x="650" y="576" font-size="12.5" fill="#52514e">a GPU stream aimed at a CPU stage is refused outright,</text>
    <text x="650" y="594" font-size="12.5" fill="#52514e">rather than silently downgraded to a host stream</text>

    <!-- fan lines from Q4 to the four outcomes -->
    <path d="M 430 360 L 430 435 L 460 435" stroke="#8b8a84" stroke-width="1.6" fill="none" marker-end="url(#a-g)"/>
    <path d="M 430 435 L 430 507 L 460 507" stroke="#8b8a84" stroke-width="1.6" fill="none" marker-end="url(#a-g)"/>
    <path d="M 430 507 L 430 579 L 460 579" stroke="#8b8a84" stroke-width="1.6" fill="none" marker-end="url(#a-g)"/>
  </g>
<rect x="34" y="733" width="13" height="13" rx="4" fill="#16a394"/>
<text x="54" y="744" font-size="12.5" fill="#52514e">no copy</text>
<rect x="119.4" y="733" width="13" height="13" rx="4" fill="#2a78d6"/>
<text x="139.4" y="744" font-size="12.5" fill="#52514e">handle only</text>
<rect x="229.60000000000002" y="733" width="13" height="13" rx="4" fill="#6b5ca8"/>
<text x="249.60000000000002" y="744" font-size="12.5" fill="#52514e">GPU pool copy</text>
<rect x="352.20000000000005" y="733" width="13" height="13" rx="4" fill="#d97a2b"/>
<text x="372.20000000000005" y="744" font-size="12.5" fill="#52514e">host copy</text>
<rect x="450.00000000000006" y="733" width="13" height="13" rx="4" fill="#d9d8d2"/>
<text x="470.00000000000006" y="744" font-size="12.5" fill="#52514e">future</text>
<rect x="529.2" y="733" width="13" height="13" rx="4" fill="#d03b3b"/>
<text x="549.2" y="744" font-size="12.5" fill="#52514e">refused</text>
<line x1="34" y1="764" x2="1214" y2="764" stroke="#e6e5df" stroke-width="1"/>
<text x="34" y="786" font-size="12.5" fill="#52514e"><tspan>The direct path has a strict eligibility checklist (§4.2 of the doc); anything that misses a rule falls back to the general relay.</tspan></text>
<text x="34" y="809" font-size="12.5" fill="#52514e"><tspan>One more caveat: without peer access between the two GPUs, the “CUDA IPC” copy may actually go through host memory.</tspan></text>
</svg>
