<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260">
  <defs>
    <marker id="arrvs" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <rect width="820" height="260" rx="4" fill="#F5F5F5"/>

  <text x="410" y="26" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">ASR vs TTS Architecture</text>

  <!-- ASR row -->
  <rect x="20" y="44" width="780" height="90" rx="10" fill="#E8F0FF" stroke="#5B8DEF" stroke-width="1.5"/>
  <text x="36" y="66" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">ASR (MOSS-TD)</text>
  <text x="220" y="66" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" fill="#555">Audio &#8594; Text</text>

  <rect x="40" y="76" width="220" height="46" rx="8" fill="#FFE8A8" stroke="#C8A050" stroke-width="1.2"/>
  <text x="150" y="94" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">Whisper Encoder</text>
  <text x="150" y="111" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#555">24-layer Transformer, d=1024</text>

  <line x1="264" y1="99" x2="296" y2="99" stroke="#555" stroke-width="1.5" marker-end="url(#arrvs)"/>

  <rect x="300" y="76" width="220" height="46" rx="8" fill="#E0E0E0" stroke="#888" stroke-width="1.2"/>
  <text x="410" y="94" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">FFN Adaptor</text>
  <text x="410" y="111" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#555">Linear&#8594;SiLU&#8594;Linear, 4096&#8594;1024</text>

  <line x1="524" y1="99" x2="556" y2="99" stroke="#555" stroke-width="1.5" marker-end="url(#arrvs)"/>

  <rect x="560" y="76" width="220" height="46" rx="8" fill="#F0C8B0" stroke="#B88868" stroke-width="1.2"/>
  <text x="670" y="94" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">Qwen3 LLM</text>
  <text x="670" y="111" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#555">28-layer decoder &#8594; text tokens</text>

  <!-- TTS row -->
  <rect x="20" y="150" width="780" height="90" rx="10" fill="#FFF3E0" stroke="#E6A040" stroke-width="1.5"/>
  <text x="36" y="172" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">TTS (MOSS-TTS-Local-v1.5)</text>
  <text x="300" y="172" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" fill="#555">Text &#8594; Audio</text>

  <rect x="40" y="182" width="165" height="46" rx="8" fill="#FFE8A8" stroke="#C8A050" stroke-width="1.2"/>
  <text x="122" y="200" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">Codec Encoder</text>
  <text x="122" y="216" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" fill="#555">~1B RVQ, 12 codebooks</text>

  <line x1="209" y1="205" x2="231" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrvs)"/>

  <rect x="235" y="182" width="165" height="46" rx="8" fill="#F0C8B0" stroke="#B88868" stroke-width="1.2"/>
  <text x="317" y="200" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">Qwen3-4B Backbone</text>
  <text x="317" y="216" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" fill="#555">36-layer, hidden states</text>

  <line x1="404" y1="205" x2="426" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrvs)"/>

  <rect x="430" y="182" width="165" height="46" rx="8" fill="#F0C8B0" stroke="#B88868" stroke-width="1.2"/>
  <text x="512" y="200" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">Local Transformer</text>
  <text x="512" y="216" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" fill="#555">1-layer, 12 codes/frame</text>

  <line x1="599" y1="205" x2="621" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrvs)"/>

  <rect x="625" y="182" width="165" height="46" rx="8" fill="#D4B8A8" stroke="#907058" stroke-width="1.2"/>
  <text x="707" y="200" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.75" font-weight="bold" fill="#333">Vocoder</text>
  <text x="707" y="216" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" fill="#555">~1B decoder &#8594; 48 kHz</text>
</svg>
