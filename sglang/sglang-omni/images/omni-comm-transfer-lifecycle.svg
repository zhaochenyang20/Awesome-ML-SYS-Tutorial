<svg xmlns="http://www.w3.org/2000/svg" width="1248" height="848" viewBox="0 0 1248 848" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
<rect x="0.5" y="0.5" width="1247" height="847" rx="14" fill="#ffffff" stroke="#e6e5df"/>
<text x="34" y="48" font-size="21" font-weight="700" fill="#14304a" letter-spacing="-0.2">The life of one relay-backed transfer</text>
<g transform="translate(34,70)">
    <defs>
      <marker id="s-o" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#d97a2b" stroke-width="1.8" stroke-linecap="round"/></marker>
      <marker id="s-t" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#16a394" stroke-width="1.8" stroke-linecap="round"/></marker>
      <marker id="s-b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#2a78d6" stroke-width="1.8" stroke-linecap="round"/></marker>
    <marker id="s-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#b3b2ab" stroke-width="1.6" stroke-linecap="round"/></marker>
    </defs>

    <!-- ============ lifeline headers ============ -->
    <!-- columns: producer 110, sender engine 340, pool 570, receiver engine 810, consumer 1060 -->
    <g font-size="13" font-weight="700">
      <rect x="30"  y="0" width="160" height="40" rx="10" fill="#fdf3e7"/>
      <text x="110" y="25" fill="#a55a17" text-anchor="middle">Producer stage</text>
      <rect x="250" y="0" width="180" height="40" rx="10" fill="#fdf3e7"/>
      <text x="340" y="25" fill="#a55a17" text-anchor="middle">CommEngine (send)</text>
      <rect x="480" y="0" width="180" height="40" rx="10" fill="#f2effa"/>
      <text x="570" y="25" fill="#584a92" text-anchor="middle">Relay pool</text>
      <rect x="710" y="0" width="200" height="40" rx="10" fill="#e9f6f4"/>
      <text x="810" y="25" fill="#0c7368" text-anchor="middle">CommEngine (receive)</text>
      <rect x="970" y="0" width="180" height="40" rx="10" fill="#e9f6f4"/>
      <text x="1060" y="25" fill="#0c7368" text-anchor="middle">Consumer stage</text>
    </g>

    <!-- lifelines -->
    <g stroke="#dcdbd4" stroke-width="1.5" stroke-dasharray="4 5">
      <line x1="110"  y1="44" x2="110"  y2="640"/>
      <line x1="340"  y1="44" x2="340"  y2="640"/>
      <line x1="570"  y1="44" x2="570"  y2="640"/>
      <line x1="810"  y1="44" x2="810"  y2="640"/>
      <line x1="1060" y1="44" x2="1060" y2="640"/>
    </g>

    <!-- "await is alive" bar on producer lifeline: steps 1-4 (y 80..300) -->
    <rect x="103" y="80" width="14" height="220" rx="7" fill="#d97a2b" opacity="0.25"/>
    <rect x="333" y="120" width="14" height="480" rx="7" fill="#d97a2b" opacity="0.14"/>
    <rect x="803" y="374" width="14" height="166" rx="7" fill="#16a394" opacity="0.14"/>


    <!-- time axis -->
    <line x1="16" y1="70" x2="16" y2="600" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#s-g)"/>
    <text x="16" y="628" font-size="11.5" fill="#898781" text-anchor="middle" font-style="italic">time</text>

    <!-- ============ events ============ -->

    <!-- 1: send_payload -->
    <circle cx="60" cy="100" r="11" fill="#d97a2b"/><text x="60" y="104.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">1</text>
    <path d="M 117 100 L 330 100" stroke="#d97a2b" stroke-width="2" marker-end="url(#s-o)"/>
    <text x="224" y="92" font-size="12" fill="#14304a" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">await send_payload(...)</text>

    <!-- 2: admission -->
    <circle cx="60" cy="150" r="11" fill="#d97a2b"/><text x="60" y="154.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">2</text>
    <path d="M 347 142 C 400 128, 400 172, 347 158" stroke="#d97a2b" stroke-width="2" fill="none" marker-end="url(#s-o)"/>
    <text x="412" y="146" font-size="12" fill="#52514e">into the bounded queue — if it's full, the await parks right here</text>

    <!-- 3: put_async -->
    <circle cx="60" cy="205" r="11" fill="#d97a2b"/><text x="60" y="209.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">3</text>
    <path d="M 347 205 L 560 205" stroke="#d97a2b" stroke-width="2" marker-end="url(#s-o)"/>
    <text x="453" y="197" font-size="12" fill="#52514e" text-anchor="middle">put_async: bytes go into the pool</text>

    <!-- 4: DataReady + return -->
    <circle cx="60" cy="258" r="11" fill="#d97a2b"/><text x="60" y="262.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">4</text>
    <path d="M 347 258 L 800 258" stroke="#2a78d6" stroke-width="2" marker-end="url(#s-b)"/>
    <rect x="440" y="242" width="270" height="26" rx="13" fill="#fff" stroke="#c5d9f3"/>
    <text x="575" y="259.5" font-size="12" font-weight="600" fill="#1c5cab" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">DataReadyMessage(DataRef)</text>

    <!-- 4b: send returns -->
    <path d="M 330 300 L 117 300" stroke="#d97a2b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#s-o)"/>
    <text x="224" y="292" font-size="12" fill="#14304a" text-anchor="middle" font-weight="600">the await ends here</text>

    <rect x="30" y="316" width="360" height="30" rx="8" fill="#fdf7e7"/>
    <text x="46" y="336" font-size="12" fill="#8a6200">published ≠ consumed — nobody has read anything yet</text>

    <!-- 5: get_async -->
    <circle cx="60" cy="390" r="11" fill="#16a394"/><text x="60" y="394.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">5</text>
    <path d="M 803 390 L 580 390" stroke="#16a394" stroke-width="2" marker-end="url(#s-t)"/>
    <text x="692" y="382" font-size="12" fill="#52514e" text-anchor="middle">get_async: wait for the ready event,</text>
    <text x="692" y="406" font-size="12" fill="#52514e" text-anchor="middle">copy into receiver-owned memory</text>

    <!-- 6: commit -->
    <circle cx="60" cy="448" r="11" fill="#16a394"/><text x="60" y="452.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">6</text>
    <path d="M 817 448 L 1050 448" stroke="#16a394" stroke-width="2" marker-end="url(#s-t)"/>
    <text x="933" y="440" font-size="12" fill="#52514e" text-anchor="middle">deliver: in lane order</text>

    <!-- 7: ack -->
    <circle cx="60" cy="510" r="11" fill="#16a394"/><text x="60" y="514.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">7</text>
    <path d="M 803 510 L 350 510" stroke="#2a78d6" stroke-width="2" marker-end="url(#s-b)"/>
    <rect x="430" y="494" width="290" height="26" rx="13" fill="#fff" stroke="#c5d9f3"/>
    <text x="575" y="511.5" font-size="12" font-weight="600" fill="#1c5cab" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">DataAckMessage(success | error)</text>

    <!-- 8: reclaim -->
    <circle cx="60" cy="570" r="11" fill="#d97a2b"/><text x="60" y="574.5" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">8</text>
    <path d="M 347 570 L 560 570" stroke="#d97a2b" stroke-width="2" marker-end="url(#s-o)"/>
    <text x="453" y="562" font-size="12" fill="#52514e" text-anchor="middle">success: the slots are free to reuse</text>

    <!-- off-loop region annotation -->
    <line x1="30" y1="362" x2="1150" y2="362" stroke="#c3c2b7" stroke-width="1.4" stroke-dasharray="7 5"/>
    <text x="1150" y="354" font-size="12" fill="#898781" text-anchor="end" font-style="italic">from here down, background workers take over; the stage's event loop has moved on</text>

    <!-- timeout note -->
    <rect x="250" y="600" width="560" height="30" rx="8" fill="#fdf7e7"/>
    <text x="266" y="620" font-size="12" fill="#8a6200">negative ack, or no ack within 30 s? the relay fails closed; slots are never recycled</text>
  </g>
<rect x="34" y="735" width="13" height="13" rx="4" fill="#d97a2b"/>
<text x="54" y="746" font-size="12.5" fill="#52514e">sender side</text>
<rect x="144.2" y="735" width="13" height="13" rx="4" fill="#16a394"/>
<text x="164.2" y="746" font-size="12.5" fill="#52514e">receiver side</text>
<rect x="266.8" y="735" width="13" height="13" rx="4" fill="#2a78d6"/>
<text x="286.8" y="746" font-size="12.5" fill="#52514e">control message (ZMQ)</text>
<line x1="34" y1="766" x2="1214" y2="766" stroke="#e6e5df" stroke-width="1"/>
<text x="34" y="788" font-size="12.5" fill="#52514e"><tspan>Who is busy when: the producer through steps 1–4 (its </tspan><tspan font-family="ui-monospace, Menlo, Consolas, monospace">await</tspan><tspan>), the sender engine from 2 until step 8 resolves the transfer, the receiver engine through 5–7.</tspan></text>
<text x="34" y="811" font-size="12.5" fill="#52514e"><tspan>Steps 5–7 can overlap across messages; step 6 is serialized per lane.</tspan></text>
</svg>
