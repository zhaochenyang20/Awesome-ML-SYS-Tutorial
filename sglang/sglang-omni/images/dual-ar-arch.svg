<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" font-family="Helvetica, Arial, sans-serif">
  <rect width="520" height="370" fill="#F9F9F7"/>
  <line x1="0" y1="4" x2="520" y2="4" stroke="#E4E4E2" stroke-width="1"/>
  <line x1="0" y1="366" x2="520" y2="366" stroke="#E4E4E2" stroke-width="1"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#AAA"/>
    </marker>
  </defs>

  <!-- ===== Slow AR (large) ===== -->
  <rect x="40" y="20" width="440" height="108" rx="10" fill="#fff" stroke="#2A2A2A" stroke-width="2"/>
  <text x="260" y="48" text-anchor="middle" font-size="17" font-weight="700" fill="#1A1A1A">Slow AR</text>
  <text x="260" y="70" text-anchor="middle" font-size="12" fill="#999">Qwen3-4B · 36 transformer layers</text>
  <text x="260" y="88" text-anchor="middle" font-size="11" fill="#BBB">KV cache persists across frames</text>
  <text x="260" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#6C5FBC">samples L₀ per frame</text>

  <!-- Arrow -->
  <line x1="260" y1="128" x2="260" y2="230" stroke="#AAA" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow labels (left of arrow) -->
  <text x="242" y="160" text-anchor="end" font-size="11" fill="#999">last-layer hidden state</text>
  <text x="242" y="176" text-anchor="end" font-size="11" fill="#999">+ sampled L₀ embedding</text>

  <!-- L₀ token square (right of arrow, not overlapping) -->
  <rect x="272" y="160" width="18" height="18" rx="3" fill="#6C5FBC" stroke="#5347A0" stroke-width="0.8"/>
  <text x="281" y="173" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">L₀</text>

  <!-- ===== Fast AR (smaller) ===== -->
  <rect x="100" y="238" width="320" height="108" rx="8" fill="#fff" stroke="#2A2A2A" stroke-width="1.5"/>
  <text x="260" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Fast AR</text>
  <text x="260" y="288" text-anchor="middle" font-size="12" fill="#999">4 transformer layers</text>
  <text x="260" y="306" text-anchor="middle" font-size="11" fill="#BBB">KV cache rebuilt each frame</text>
  <text x="260" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#6C5FBC">9 sequential steps: L₁ → L₂ → … → L₉</text>
</svg>
