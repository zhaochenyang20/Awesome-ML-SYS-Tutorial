<text x="76" y="399.5" font-size="16.5" font-weight="400" fill="#f6faff">Qwen3-4B autoregressive decoder</text>
<text x="76" y="421.5" font-size="16.5" font-weight="400" fill="#f6faff">(~4B params)</text>
<text x="574" y="371.5" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">BACKBONE</text>
<text x="574" y="399.5" font-size="16.5" font-weight="400" fill="#1e5fd6">Qwen3-4B global transformer</text>
<text x="574" y="421.5" font-size="16.5" font-weight="400" fill="#1e5fd6">(~4B params)</text>
<line x1="76" y1="433.5" x2="474" y2="433.5" stroke="#4f86e8" stroke-width="1"/>
<line x1="574" y1="433.5" x2="972" y2="433.5" stroke="#d3e4fb" stroke-width="1"/>
<text x="76" y="453.0" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#bcd2f5">RVQ LAYERS</text>
<text x="76" y="481.0" font-size="16.5" font-weight="400" fill="#f6faff">8 layers @ 25 fps</text>
<text x="574" y="453.0" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">RVQ LAYERS</text>
<text x="574" y="481.0" font-size="16.5" font-weight="400" fill="#1e5fd6">13 layers @ 12.5 Hz</text>
<line x1="76" y1="493.0" x2="474" y2="493.0" stroke="#4f86e8" stroke-width="1"/>
<line x1="574" y1="493.0" x2="972" y2="493.0" stroke="#d3e4fb" stroke-width="1"/>
<text x="76" y="512.5" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#bcd2f5">LAYER-GENERATION STRATEGY</text>
<text x="76" y="540.5" font-size="16.5" font-weight="400" fill="#f6faff">Backbone heads sample all 8</text>
<text x="76" y="562.5" font-size="16.5" font-weight="400" fill="#f6faff">layers per step via delay pattern</text>
<text x="574" y="512.5" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">LAYER-GENERATION STRATEGY</text>
<text x="574" y="540.5" font-size="16.5" font-weight="400" fill="#1e5fd6">Backbone decodes layer 0; a 1-layer</text>
<text x="574" y="562.5" font-size="16.5" font-weight="400" fill="#1e5fd6">local transformer fills layers 1–12</text>
<line x1="76" y1="574.5" x2="474" y2="574.5" stroke="#4f86e8" stroke-width="1"/>
<line x1="574" y1="574.5" x2="972" y2="574.5" stroke="#d3e4fb" stroke-width="1"/>
<text x="76" y="594.0" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#bcd2f5">REFERENCE ENCODER</text>
<text x="76" y="622.0" font-size="16.5" font-weight="400" fill="#f6faff">DAC-style encoder, weights tied</text>
<text x="76" y="644.0" font-size="16.5" font-weight="400" fill="#f6faff">into the AR backbone checkpoint</text>
<text x="574" y="594.0" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">REFERENCE ENCODER</text>
<text x="574" y="622.0" font-size="16.5" font-weight="400" fill="#1e5fd6">MOSS-Audio-Tokenizer-v2 encoder,</text>
<text x="574" y="644.0" font-size="16.5" font-weight="400" fill="#1e5fd6">loaded separately (~1B)</text>
<line x1="76" y1="656.0" x2="474" y2="656.0" stroke="#4f86e8" stroke-width="1"/>
<line x1="574" y1="656.0" x2="972" y2="656.0" stroke="#d3e4fb" stroke-width="1"/>
<text x="76" y="675.5" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#bcd2f5">VOCODER</text>
<text x="76" y="703.5" font-size="16.5" font-weight="400" fill="#f6faff">DAC decoder; not natively</text>
<text x="76" y="725.5" font-size="16.5" font-weight="400" fill="#f6faff">streamable → windowed chunking</text>
<text x="574" y="675.5" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">VOCODER</text>
<text x="574" y="703.5" font-size="16.5" font-weight="400" fill="#1e5fd6">MOSS-Audio-Tokenizer-v2 decoder;</text>
<text x="574" y="725.5" font-size="16.5" font-weight="400" fill="#1e5fd6">natively streamable, frame-by-frame</text>
<line x1="76" y1="737.5" x2="474" y2="737.5" stroke="#4f86e8" stroke-width="1"/>
<line x1="574" y1="737.5" x2="972" y2="737.5" stroke="#d3e4fb" stroke-width="1"/>
<text x="76" y="757.0" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#bcd2f5">EXTRA WEIGHTS IN MEMORY</text>
<text x="76" y="785.0" font-size="16.5" font-weight="400" fill="#f6faff">~0 — encoder/vocoder reuse the</text>
<text x="76" y="807.0" font-size="16.5" font-weight="400" fill="#f6faff">backbone's bundled DAC weights</text>
<text x="574" y="757.0" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">EXTRA WEIGHTS IN MEMORY</text>
<text x="574" y="785.0" font-size="16.5" font-weight="400" fill="#1e5fd6">~8.6 GB — separate encoder +</text>
<text x="574" y="807.0" font-size="16.5" font-weight="400" fill="#1e5fd6">vocoder on top of the backbone</text>
