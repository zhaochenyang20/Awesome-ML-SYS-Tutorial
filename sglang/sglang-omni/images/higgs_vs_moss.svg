<text x="574" y="290" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f86c4">WEIGHT PROFILE</text>
<text x="574" y="318" font-size="16.5" font-weight="400" fill="#1e5fd6">Heavy backbone · heavy encoder</text>
<text x="574" y="340" font-size="16.5" font-weight="400" fill="#1e5fd6">&amp; vocoder</text>
