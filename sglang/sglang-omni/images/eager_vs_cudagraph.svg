<rect x="816" y="292" width="524" height="34" rx="5" fill="#1e5fd6"/>
<text x="426.0" y="350" text-anchor="middle" font-size="13" fill="#6b7a93">Step N</text>
<text x="936" y="350" text-anchor="middle" font-size="13" fill="#6b7a93">Step N+1</text>
<line x1="40" y1="376" x2="1340" y2="376" stroke="#cdddf6" stroke-width="1.5"/>
</svg>