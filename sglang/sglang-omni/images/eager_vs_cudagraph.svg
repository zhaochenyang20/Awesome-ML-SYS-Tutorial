<rect x="280" y="120" width="72" height="34" rx="4" fill="#1e5fd6"/>
<rect x="352" y="124" width="20" height="26" rx="2" fill="#d4dceb"/>
<rect x="372" y="120" width="72" height="34" rx="4" fill="#1e5fd6"/>
<rect x="444" y="124" width="20" height="26" rx="2" fill="#d4dceb"/>
<rect x="464" y="120" width="72" height="34" rx="4" fill="#1e5fd6"/>
<rect x="536" y="124" width="20" height="26" rx="2" fill="#d4dceb"/>
<rect x="556" y="120" width="72" height="34" rx="4" fill="#1e5fd6"/>
