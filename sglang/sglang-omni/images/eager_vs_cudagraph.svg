<text x="900" y="132" font-size="15" fill="#6b7a93">Gaps = CPU launch overhead</text>
<text x="900" y="154" font-size="15" fill="#6b7a93">Adds up across ~250 steps</text>
<line x1="40" y1="190" x2="1340" y2="190" stroke="#b9d0f0" stroke-width="1.4" stroke-dasharray="7,6"/>
<text x="40" y="250" font-size="22" font-weight="700" fill="#1e5fd6">CUDA Graph</text>
<text x="232" y="250" font-size="16" fill="#6b7a93">Record once, replay entire step as one call</text>
<text x="40" y="314" font-family="'SF Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="13" letter-spacing="1" fill="#5f86c4">GPU</text>
