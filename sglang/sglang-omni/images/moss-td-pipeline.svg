<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 160">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="880" height="160" fill="#F8FAFC"/>

  <text x="440" y="28" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" letter-spacing="4" fill="#4C66C9">MOSS-TD ASR INFERENCE PIPELINE</text>
  <line x1="40" y1="40" x2="840" y2="40" stroke="#D9E0EC" stroke-width="1"/>

  <!-- Audio -->
  <rect x="20" y="55" width="100" height="70" rx="6" fill="#FFFFFF" stroke="#C9D3E6" stroke-width="1.2"/>
  <text x="70" y="87" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#16265C">Audio</text>
  <text x="70" y="105" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#64748B">up to ~90 min</text>

  <line x1="124" y1="90" x2="150" y2="90" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Encoder -->
  <rect x="155" y="55" width="180" height="70" rx="6" fill="#E9EEF9" stroke="#C7D2E8" stroke-width="1.2"/>
  <text x="245" y="87" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#16265C">1. Encoder</text>
  <text x="245" y="105" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#64748B">Whisper &#8594; embeddings</text>

  <line x1="339" y1="90" x2="365" y2="90" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Prefill -->
  <rect x="370" y="55" width="180" height="70" rx="6" fill="#2B52D6" stroke="#2B52D6" stroke-width="1.2"/>
  <text x="460" y="87" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">2. LLM Prefill</text>
  <text x="460" y="105" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#CDD9F6">Qwen3 builds the KV cache</text>

  <line x1="554" y1="90" x2="580" y2="90" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AR Decode -->
  <rect x="585" y="55" width="180" height="70" rx="6" fill="#1B2660" stroke="#1B2660" stroke-width="1.2"/>
  <text x="675" y="87" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">3. AR Decode</text>
  <text x="675" y="105" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#AAB6E4">generate tokens until EOS</text>

  <line x1="769" y1="90" x2="785" y2="90" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="790" y="55" width="80" height="70" rx="6" fill="#EFF3FC" stroke="#2B52D6" stroke-width="1.5"/>
  <text x="830" y="82" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#2B52D6">Text</text>
  <text x="830" y="98" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#64748B">diarized</text>
  <text x="830" y="114" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.75" fill="#64748B">transcript</text>
</svg>
