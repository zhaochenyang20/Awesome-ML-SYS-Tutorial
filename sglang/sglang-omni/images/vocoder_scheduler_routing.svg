<svg viewBox="0 0 1180 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1180" height="200" fill="#fafbfd"/>

  <!-- title -->
  <text x="590" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#111111">Vocoder Scheduler: Request Routing</text>

  <!-- incoming requests -->
  <rect x="12" y="58" width="166" height="58" rx="10" fill="#d8e6fb"/>
  <text x="95" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">Incoming Requests</text>

  <!-- arrow to router -->
  <g stroke="#7a97d4" stroke-width="1.8" fill="#7a97d4">
    <line x1="178" y1="87" x2="282" y2="87"/>
    <path d="M282 87 L273 81 L273 93 Z"/>
  </g>

  <!-- router -->
  <rect x="288" y="58" width="158" height="58" rx="10" fill="#d8e6fb"/>
  <text x="367" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">Vocoder Router</text>

  <!-- branch lines -->
  <!-- streaming (solid) -->
  <polyline points="446,87 518,87 518,66 594,66" fill="none" stroke="#7a97d4" stroke-width="1.8"/>
  <path d="M602 66 L593 60 L593 72 Z" fill="#7a97d4"/>
  <!-- batch (dashed) -->
  <polyline points="446,87 518,87 518,126 594,126" fill="none" stroke="#7a97d4" stroke-width="1.8" stroke-dasharray="5 4"/>
  <path d="M602 126 L593 120 L593 132 Z" fill="#7a97d4"/>

  <!-- streaming path -->
  <rect x="608" y="40" width="246" height="52" rx="8" fill="#d8e6fb"/>
  <text x="731" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">Streaming Path</text>
  <text x="731" y="82" text-anchor="middle" font-size="11" fill="#111111">chunk-by-chunk decode</text>

  <!-- batch path -->
  <rect x="608" y="100" width="246" height="52" rx="8" fill="#ffffff" stroke="#cdd9ee"/>
  <text x="731" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">Batch Path</text>
  <text x="731" y="142" text-anchor="middle" font-size="11" fill="#111111">bucketed batch decode</text>

  <!-- streaming -> audio chunks (solid) -->
  <g stroke="#7a97d4" stroke-width="1.8" fill="#7a97d4">
    <line x1="854" y1="66" x2="926" y2="66"/>
    <path d="M934 66 L925 60 L925 72 Z"/>
  </g>
  <!-- batch -> full audio (dashed) -->
  <line x1="854" y1="126" x2="926" y2="126" stroke="#7a97d4" stroke-width="1.8" stroke-dasharray="5 4"/>
  <path d="M934 126 L925 120 L925 132 Z" fill="#7a97d4"/>

  <!-- outputs -->
  <rect x="934" y="40" width="234" height="52" rx="8" fill="#d8e6fb"/>
  <text x="1051" y="70" text-anchor="middle" font-size="14" fill="#111111">Audio Chunks</text>

  <rect x="934" y="100" width="234" height="52" rx="8" fill="#ffffff" stroke="#cdd9ee"/>
  <text x="1051" y="130" text-anchor="middle" font-size="14" fill="#111111">Full Audio</text>

  <!-- branch labels (drawn last so boxes never cover them) -->
  <text x="556" y="52" text-anchor="middle" font-size="11" fill="#111111">stream=True</text>
  <text x="556" y="158" text-anchor="middle" font-size="11" fill="#111111">stream=False</text>
</svg>
